# IMPORTANT: change "habit-tracker-app" to your unique app name (must be globally unique on fly.io)
app = "habit-tracker-app"
primary_region = "ams"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/prod.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "habit_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
